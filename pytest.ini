[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = core/tests
markers =
    smoke: fast sanity checks for the test harness itself
    permissions: role and cross-school (tenant) isolation matrix tests
filterwarnings =
    # Pre-existing drf_yasg library deprecation surfaced on URLconf load; not
    # related to the tests. Tracked separately from the test suite.
    ignore:SwaggerJSONRenderer:DeprecationWarning
